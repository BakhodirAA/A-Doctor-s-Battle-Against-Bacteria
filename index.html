<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Медик Юлия: Chiptune Sound Edition</title>
<style>
body{ margin:0; overflow:hidden; background-color:#1a2a3a; font-family:Segoe UI; touch-action:none; }
#ui{ position:absolute; top:15px; left:15px; color:white; font-size:24px; font-weight:bold; z-index:10; pointer-events:none; }
</style>
</head>
<body>

<div id="ui">Счет: <span id="score">0</span> | Здоровье: <span id="lives">∞</span></div>
<canvas id="gameCanvas"></canvas>

<script>
const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");

function resize(){
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
}
window.addEventListener("resize",resize);
resize();

let score=0;
let frameCount=0;
let hasStarted = false;
let lookTimer = 0;

const phrases = ["Wonderful!", "Amazing!", "Beautiful!", "Fantastic!", "Incredible!", "Perfect!", "Excellent!", "Splendid!", "Marvelous!", "Great!"];
let currentPhrase = "";

// --- СИНТЕЗ РЕЧИ ---
function speak(text) {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel(); 
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        utterance.pitch = 1.2;
        utterance.rate = 1.0;
        window.speechSynthesis.speak(utterance);
    }
}

// --- АУДИО КОНТЕКСТ И ЗВУКИ ИЗ INDEX.HTML ---
const AudioContext = window.AudioContext || window.webkitAudioContext;
let audioCtx = new AudioContext();

function beep(freq, dur, vol, type, t) {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = type || 'square';
    o.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime(vol || 0.15, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.start(t); o.stop(t + dur + 0.01);
}

function sweep(f1, f2, dur, vol, type, t) {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = type || 'square';
    o.frequency.setValueAtTime(f1, t);
    o.frequency.linearRampToValueAtTime(f2, t + dur);
    g.gain.setValueAtTime(vol || 0.15, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.start(t); o.stop(t + dur + 0.01);
}

function playShootSound() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    beep(500, 0.1, 0.05, 'square', audioCtx.currentTime);
}

function playMatchSound() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const t = audioCtx.currentTime;
    const notes = [523, 659, 784, 1047]; 
    for(let i = 0; i < notes.length; i++) {
        beep(notes[i], 0.1, 0.15, 'square', t + i * 0.07);
    }
    sweep(800, 1600, 0.18, 0.1, 'square', t + 0.32); 
}

const player={
    x:canvas.width/2,
    y:canvas.height*0.8,
    targetX:canvas.width/2
};

let projectiles=[];
let enemies=[];
let particles=[];

function handleInteraction() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    if (!hasStarted) {
        hasStarted = true;
        let silence = new SpeechSynthesisUtterance("");
        window.speechSynthesis.speak(silence);
        lookTimer = 120; 
        currentPhrase = "Are you ready?";
        setTimeout(() => speak(currentPhrase), 150);
    }
}

canvas.addEventListener("mousemove", e => { player.targetX = e.clientX; });
canvas.addEventListener("touchmove", e => { 
    player.targetX = e.touches[0].clientX; 
    e.preventDefault(); 
}, {passive: false});
canvas.addEventListener("mousedown", handleInteraction);
canvas.addEventListener("touchstart", handleInteraction, {passive: false});

class Projectile{
    constructor(x,y){ this.x=x; this.y=y; this.width=8; this.height=16; this.speed=10; }
    draw(){
        ctx.fillStyle="#00d2ff"; ctx.beginPath(); ctx.arc(this.x,this.y,4,Math.PI,0); ctx.fill();
        ctx.fillStyle="white"; ctx.beginPath(); ctx.arc(this.x,this.y+12,4,0,Math.PI); ctx.fill();
        ctx.fillRect(this.x-4, this.y, 8, 12);
    }
    update(){ this.y-=this.speed; }
}

class Enemy{
    constructor(){
        this.x=Math.random()*(canvas.width-40)+20;
        this.y=-50;
        let r=Math.random();
        this.type = r<0.33 ? "koch" : (r<0.66 ? "aureus" : "purple"); // Изменено на aureus
        this.width = 25; this.height = 25;
        this.speed = 1.2 + Math.random(); 
        this.hp = this.type==="koch" ? 1 : 2;
    }
    draw(){
        ctx.fillStyle = this.type==="koch" ? "#ff3333" : (this.type==="aureus" ? "#FFD700" : "#a64dff"); // Золотистый цвет
        ctx.beginPath(); 
        if (this.type === "koch") {
            ctx.ellipse(this.x, this.y, 6, 16, 0, 0, Math.PI*2);
        } else {
            ctx.arc(this.x, this.y, 12, 0, Math.PI*2);
        }
        ctx.fill();
    }
    update(){ this.y+=this.speed; }
}

class Particle{
    constructor(x,y,color){ this.x=x; this.y=y; this.vx=(Math.random()-0.5)*6; this.vy=(Math.random()-0.5)*6; this.life=1; this.color=color; }
    draw(){ ctx.globalAlpha=this.life; ctx.fillStyle=this.color; ctx.beginPath(); ctx.arc(this.x,this.y,2.5,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1; }
    update(){ this.x+=this.vx; this.y+=this.vy; this.life-=0.04; }
}

function drawPlayer(){
    player.x+=(player.targetX-player.x)*0.1;
    player.y=canvas.height-100;
    let x=player.x; let y=player.y;

    ctx.fillStyle="white"; 
    ctx.beginPath(); 
    ctx.moveTo(x, y-40);
    ctx.lineTo(x+25, y+40);
    ctx.lineTo(x-25, y+40);
    ctx.closePath();
    ctx.fill();
    
    ctx.save();
    ctx.translate(x - 12.5, y); 
    let angle = Math.atan2(-80, 25); 
    ctx.rotate(angle);
    ctx.font = "bold 13px Arial";
    ctx.textAlign = "center";
    ctx.strokeStyle = "rgba(0, 64, 128, 0.4)"; ctx.lineWidth = 2;
    ctx.strokeText("ЮЛИЯ", 0, -3);
    ctx.fillStyle = "white"; 
    ctx.fillText("ЮЛИЯ", 0, -3); 
    ctx.restore();

    ctx.fillStyle="red"; ctx.fillRect(x-4,y-10,8,20); ctx.fillRect(x-10,y-4,20,8);
    ctx.fillStyle="#ffccbb"; ctx.beginPath(); ctx.arc(x,y-50,15,0,Math.PI*2); ctx.fill();

    if (lookTimer > 0) {
        lookTimer--;
        ctx.fillStyle="#dca75b"; 
        ctx.beginPath(); ctx.arc(x+14,y-45,8,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(x,y-52,16,Math.PI,0); ctx.fill();
        const drawEye = (ex, ey) => {
            ctx.fillStyle = "white"; ctx.beginPath(); ctx.ellipse(ex, ey, 4.5, 3.5, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#3399ff"; ctx.beginPath(); ctx.arc(ex, ey, 2.5, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "black"; ctx.beginPath(); ctx.arc(ex, ey, 1, 0, Math.PI*2); ctx.fill();
        };
        drawEye(x - 6, y - 52); drawEye(x + 6, y - 52);
        ctx.strokeStyle = "#ff6666"; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.arc(x, y - 45, 4, 0.2, Math.PI - 0.2); ctx.stroke(); 

        if (currentPhrase) {
            ctx.font = "bold 20px 'Segoe UI'"; ctx.textAlign = "center";
            ctx.fillStyle = "rgba(0,0,0,0.3)"; ctx.fillText(currentPhrase, x + 2, y - 88);
            ctx.fillStyle = "#00d2ff"; ctx.fillText(currentPhrase, x, y - 90);
        }
    } else {
        ctx.fillStyle="#dca75b"; 
        ctx.beginPath(); ctx.arc(x,y-52,16,Math.PI,0); ctx.fill();
        ctx.beginPath(); ctx.arc(x+15,y-45,8,0,Math.PI*2); ctx.fill();
    }
}

function gameLoop(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    if (hasStarted && frameCount > 0 && frameCount % 1200 === 0) {
        lookTimer = 120;
        currentPhrase = phrases[Math.floor(Math.random() * phrases.length)];
        speak(currentPhrase);
    }

    if(hasStarted && frameCount % 100 === 0) enemies.push(new Enemy());
    if(frameCount % 15 === 0){ 
        projectiles.push(new Projectile(player.x, player.y-40)); 
        if(hasStarted) playShootSound(); 
    }
    
    for(let i=particles.length-1;i>=0;i--){
        particles[i].update(); particles[i].draw();
        if(particles[i].life<=0) particles.splice(i,1);
    }

    for(let i=projectiles.length-1;i>=0;i--){
        projectiles[i].update(); projectiles[i].draw();
        if(projectiles[i].y < -20) projectiles.splice(i,1);
    }
    
    for(let i=enemies.length-1;i>=0;i--){
        let e=enemies[i]; e.update(); e.draw();
        if(e.y > canvas.height) enemies.splice(i,1);
        
        for(let j=projectiles.length-1;j>=0;j--){
            let p=projectiles[j];
            if(Math.abs(e.x-p.x)<20 && Math.abs(e.y-p.y)<20){
                projectiles.splice(j,1);
                e.hp--;
                if(e.hp <= 0){
                    playMatchSound(); 
                    let col = e.type==="koch" ? "#ff3333" : (e.type==="aureus" ? "#FFD700" : "#a64dff"); // Цвет частиц
                    for(let k=0;k<12;k++) particles.push(new Particle(e.x, e.y, col));
                    enemies.splice(i,1); score+=10;
                }
                break;
            }
        }
    }

    drawPlayer();
    document.getElementById("score").innerText=score;
    frameCount++;
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
